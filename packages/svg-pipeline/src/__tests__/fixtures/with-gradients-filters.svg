<svg viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="red"/>
      <stop offset="100%" stop-color="yellow"/>
    </linearGradient>
    <radialGradient id="rg1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white"/>
      <stop offset="100%" stop-color="blue"/>
    </radialGradient>
    <filter id="f1">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5"/>
    </filter>
    <clipPath id="cp1">
      <circle cx="150" cy="150" r="100"/>
    </clipPath>
  </defs>
  <rect x="10" y="10" width="130" height="130" fill="url(#lg1)"/>
  <circle cx="220" cy="75" r="60" fill="url(#rg1)"/>
  <rect x="10" y="160" width="130" height="130" fill="green" filter="url(#f1)"/>
  <rect x="160" y="160" width="130" height="130" fill="purple" clip-path="url(#cp1)"/>
</svg>