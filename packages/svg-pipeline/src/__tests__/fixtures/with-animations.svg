<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect x="10" y="10" width="80" height="80" fill="blue">
    <animate attributeName="x" from="10" to="100" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="3s" repeatCount="indefinite"/>
  </rect>
  <circle cx="150" cy="50" r="20" fill="red">
    <animateMotion path="M 0 0 L 100 100" dur="4s" repeatCount="indefinite"/>
    <set attributeName="fill" to="green" begin="2s"/>
  </circle>
</svg>