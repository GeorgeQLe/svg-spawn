services:
  postgres:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: svgspawn
      POSTGRES_USER: svgspawn
      POSTGRES_PASSWORD: svgspawn
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svgspawn -d svgspawn"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
